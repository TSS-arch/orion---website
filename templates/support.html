<!-- support.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f4f4;
    padding:30px;
}

.form-container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#0a1f44;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.input-box input,
.input-box textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    min-height:140px;
    resize:vertical;
}

.submit-btn{
    width:100%;
    padding:16px;
    background:#0a1f44;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.submit-btn:hover{
    background:#d4a017;
    color:black;
}

</style>

</head>

<body>

<div class="form-container">

    <h1>Send Message & Files</h1>

    <form method="POST"
          action="/upload"
          enctype="multipart/form-data">

        <div class="input-box">

            <label>Your Name</label>

            <input type="text"
                   name="name"
                   required>

        </div>

        <div class="input-box">

            <label>Email Address</label>

            <input type="email"
                   name="email"
                   required>

        </div>

        <div class="input-box">

            <label>Message</label>

            <textarea name="message"
                      placeholder="Write your message here..."
                      required></textarea>

        </div>

        <div class="input-box">

            <label>Select File / Photo</label>

            <input type="file"
                   name="file">

        </div>

        <button type="submit"
                class="submit-btn">

            Send Now

        </button>

    </form>

</div>

</body>

</html>
